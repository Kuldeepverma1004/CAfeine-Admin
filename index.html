// ── GITHUB API ────────────────────────────────────────────────────
const toB64=(str)=>{
  const bytes=new TextEncoder().encode(str);
  let binary="";
  bytes.forEach(b=>binary+=String.fromCharCode(b));
  return btoa(binary);
};
const fromB64=(str)=>{
  const binary=atob(str);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return new TextDecoder().decode(bytes);
};

const ghGet=async(path,token)=>{
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github.v3+json"}});
  if(!r.ok)throw new Error(`GitHub GET failed: ${r.status}`);
  return r.json();
};
const ghPut=async(path,content,sha,token,message)=>{
  const body={message,content:toB64(content)};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:"PUT",headers:{"Authorization":`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.message||`GitHub PUT failed: ${r.status}`);}
  return r.json();
};

const generateWithAI=async(apiKey,subject,chapterName,chapterNum,pdfBase64,chapterId)=>{
  const isP2=subject.hasCase;
  const schema=isP2?P2_SCHEMA(chapterId):P1_SCHEMA(chapterId);
  const systemPrompt=isP2?P2_SYSTEM:P1_SYSTEM;
  const userPrompt=buildUserPrompt(subject,chapterName,chapterNum,schema);
  let r;
  try{
    r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-opus-4-5",max_tokens:16000,system:systemPrompt,messages:[{role:"user",content:[
        {type:"document",source:{type:"base64",media_type:"application/pdf",data:pdfBase64}},
        {type:"text",text:userPrompt}
      ]}]})
    });
  }catch(fetchErr){
    throw new Error("Network error — check your connection and try again.");
  }
  if(!r.ok){
    let errMsg=`Request failed (${r.status})`;
    try{const e=await r.json();if(e.error?.message){const m=e.error.message;errMsg=m.toLowerCase().includes("100 pdf")||m.includes("pdf.source.base64")?"PDF has too many pages (API limit: 100). Upload a single chapter section.":m;}}catch{}
    throw new Error(errMsg);
  }
  const data=await r.json();
  const block=data.content?.find(b=>b.type==="text");
  if(!block?.text)throw new Error("No text in API response. Try again.");
  const text=block.text.trim();
  const jsonMatch=text.match(/\{[\s\S]*\}/);
  if(!jsonMatch)throw new Error("AI did not return valid JSON. Try again.");
  return JSON.parse(jsonMatch[0]);
};

// ── FORMULA TREE EDITOR (multi-node, interactive traversal) ───────
const TreeCard=({item,onChange,onDelete})=>{
  const [mode,setMode]=useState("edit"); // "edit"|"preview"
  const [jsonText,setJsonText]=useState(()=>JSON.stringify(item,null,2));
  const [jsonErr,setJsonErr]=useState("");
  const [curId,setCurId]=useState(()=>item.nodes?.[0]?.id||null);
  const [hist,setHist]=useState([]);

  const saveJson=()=>{
    try{
      const p=JSON.parse(jsonText);
      onChange(p);
      setCurId(p.nodes?.[0]?.id||null);
      setHist([]);
      setJsonErr("");
    }catch(e){setJsonErr(e.message);}
  };
  const goTo=(targetId)=>{setHist(h=>[...h,curId]);setCurId(targetId);};
  const goBack=()=>{const p=hist[hist.length-1];setHist(h=>h.slice(0,-1));setCurId(p);};
  const reset=()=>{setCurId(item.nodes?.[0]?.id||null);setHist([]);};

  const curNode=item.nodes?.find(n=>n.id===curId);
  const curOutcome=!curNode?item.outcomes?.find(o=>o.id===curId):null;
  const isOutcome=!!curOutcome;

  return(
    <div style={{background:C.s2,border:`1px solid ${C.bl}20`,borderRadius:10,padding:14,marginBottom:8}}>
      <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
        <Badge text="DECISION TREE" color={C.bl}/>
        <span style={{fontSize:13,color:C.t1,fontWeight:500,flex:1}}>{item.topic||"Untitled Tree"}</span>
        <button onClick={()=>{if(mode==="edit"){saveJson();setMode("preview");}else setMode("edit");}}
          style={{padding:"4px 10px",borderRadius:5,border:`1px solid ${mode==="preview"?C.bl:C.b2}`,background:mode==="preview"?`${C.bl}18`:"transparent",color:mode==="preview"?C.bl:C.t3,cursor:"pointer",fontSize:11}}>
          {mode==="edit"?"▶ Preview":"✎ Edit JSON"}
        </button>
        <button onClick={onDelete} style={{color:C.rd,cursor:"pointer",fontSize:16,padding:"0 4px",background:"none",border:"none"}}>×</button>
      </div>

      {mode==="edit"&&(
        <div>
          <div style={{fontSize:10,color:C.t3,letterSpacing:2,fontFamily:"'Space Mono',mono",fontWeight:700,marginBottom:6}}>TREE JSON — nodes[] + outcomes[]</div>
          <textarea value={jsonText} onChange={e=>{setJsonText(e.target.value);setJsonErr("");}} rows={14}
            style={{width:"100%",background:C.s3,border:`1px solid ${jsonErr?C.rd:C.b2}`,color:C.t1,padding:10,borderRadius:6,fontSize:11,fontFamily:"'Space Mono',mono",lineHeight:1.6,resize:"vertical"}}/>
          {jsonErr&&<div style={{fontSize:11,color:C.rd,marginTop:4,marginBottom:6}}>{jsonErr}</div>}
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={saveJson}
              style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.am}`,background:`${C.am}18`,color:C.am,cursor:"pointer",fontSize:12,fontWeight:700}}>
              Save JSON
            </button>
            <button onClick={()=>{saveJson();setMode("preview");}}
              style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.bl}`,background:`${C.bl}18`,color:C.bl,cursor:"pointer",fontSize:12,fontWeight:700}}>
              Save &amp; Preview →
            </button>
          </div>
        </div>
      )}

      {mode==="preview"&&(
        <div>
          <div style={{minHeight:120,background:C.s3,borderRadius:8,padding:16,marginBottom:10}}>
            {curNode&&(
              <div>
                <div style={{fontSize:10,color:C.t3,letterSpacing:2,fontFamily:"'Space Mono',mono",marginBottom:8}}>
                  STEP {hist.length+1} — NODE {curNode.id}
                </div>
                <div style={{fontSize:14,color:C.bl,fontWeight:600,marginBottom:14,lineHeight:1.5}}>{curNode.label}</div>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {(curNode.branches||[]).map((branch,bi)=>(
                    <button key={bi} onClick={()=>goTo(branch.target)}
                      style={{padding:"10px 14px",borderRadius:7,border:`1px solid ${C.b3}`,background:C.b1,color:C.t1,cursor:"pointer",fontSize:13,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"border-color .15s"}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor=C.bl}
                      onMouseLeave={e=>e.currentTarget.style.borderColor=C.b3}>
                      <span>{branch.label}</span>
                      <span style={{color:C.t3,fontSize:12}}>→</span>
                    </button>
                  ))}
                </div>
              </div>
            )}
            {isOutcome&&(
              <div>
                <div style={{fontSize:10,color:C.gr,letterSpacing:2,fontFamily:"'Space Mono',mono",marginBottom:8}}>OUTCOME</div>
                <div style={{fontSize:14,color:C.gr,fontWeight:600,marginBottom:6,lineHeight:1.5}}>{curOutcome.label}</div>
                {curOutcome.reference&&<div style={{fontSize:11,color:C.t3,fontFamily:"'Space Mono',mono"}}>{curOutcome.reference}</div>}
              </div>
            )}
            {!curNode&&!isOutcome&&<div style={{color:C.t3,fontSize:12}}>No nodes defined. Edit JSON to add nodes.</div>}
          </div>
          <div style={{display:"flex",gap:8}}>
            {hist.length>0&&<button onClick={goBack}
              style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.b2}`,background:"transparent",color:C.t3,cursor:"pointer",fontSize:12}}>← Back</button>}
            <button onClick={reset}
              style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.b2}`,background:"transparent",color:C.t3,cursor:"pointer",fontSize:12}}>↺ Restart</button>
            <div style={{flex:1}}/>
            <div style={{fontSize:11,color:C.t3,alignSelf:"center",fontFamily:"'Space Mono',mono"}}>
              {item.nodes?.length||0} nodes · {item.outcomes?.length||0} outcomes
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────
function App(){
  const [authed,setAuthed]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem("caf_admin_ak")||"");
  const [ghToken,setGhToken]=useState(()=>localStorage.getItem("caf_admin_gh")||"");

  // Form state
  const [subject,setSubject]=useState(SUBJECTS[0]);
  const [chapterNum,setChapterNum]=useState("");
  const [chapterName,setChapterName]=useState("");
  const [pdfBase64,setPdfBase64]=useState("");
  const [pdfFileName,setPdfFileName]=useState("");
  const [pdfPageCount,setPdfPageCount]=useState(null);
  const [pdfPageErr,setPdfPageErr]=useState("");
  const pdfInputRef=useRef();

  // Continue-mode state
  const [showContinue,setShowContinue]=useState(false);
  const [contPdfBase64,setContPdfBase64]=useState("");
  const [contPdfFileName,setContPdfFileName]=useState("");
  const [contPdfPageCount,setContPdfPageCount]=useState(null);
  const [contPdfPageErr,setContPdfPageErr]=useState("");
  const contPdfInputRef=useRef();

  // Generated content
  const [generated,setGenerated]=useState(null);
  const [activeTab,setActiveTab]=useState("mcqs");

  // Status
  const [status,setStatus]=useState("idle"); // idle|generating|saving|done|error
  const [statusMsg,setStatusMsg]=useState("");

  // Keep localStorage in sync
  useEffect(()=>{localStorage.setItem("caf_admin_ak",apiKey);},[apiKey]);
  useEffect(()=>{localStorage.setItem("caf_admin_gh",ghToken);},[ghToken]);

  if(!authed)return <Login onLogin={()=>setAuthed(true)}/>;

  const buildChapterId=()=>`${subject.prefix}${chapterNum}`;

  const handleGenerate=async()=>{
    if(!apiKey){setShowSettings(true);return;}
    if(!chapterNum.toString().trim()){setStatusMsg("Enter chapter number first.");setStatus("error");return;}
    if(!chapterName.trim()){setStatusMsg("Enter a chapter name first.");setStatus("error");return;}
    if(!pdfBase64){setStatusMsg("Upload a chapter PDF first.");setStatus("error");return;}
    setStatus("generating");setStatusMsg("");setGenerated(null);
    try{
      const id=buildChapterId();
      const result=await generateWithAI(apiKey,subject,chapterName.trim(),chapterNum,pdfBase64,id);
      result.id=result.id||id;
      result.name=result.name===("[Chapter Name]")?chapterName:result.name;
      if(!Array.isArray(result.dangerZones))result.dangerZones=[];
      if(!Array.isArray(result.formulaGuide))result.formulaGuide=[];
      if(!Array.isArray(result.flashcards))result.flashcards=[];
      if(!Array.isArray(result.practiceProblems))result.practiceProblems=[];
      if(!result.caseMCQs||typeof result.caseMCQs!=="object")result.caseMCQs={scenario:"",questions:[]};
      if(!Array.isArray(result.caseMCQs.questions))result.caseMCQs.questions=[];
      if(!Array.isArray(result.mcqs))result.mcqs=[];
      if(!Array.isArray(result.tricky))result.tricky=[];
      if(!Array.isArray(result.amendments))result.amendments=[];
      if(!Array.isArray(result.cases))result.cases=[];
      if(!Array.isArray(result.trees))result.trees=[];
      const BAD_PHRASES=["let me recalculate","actually,","wait -","recomputing","nope","let me check","recalculating","wait,","hmm,","let me re","actually i","actually the","let me","re-calculating"];
      const flagMCQ=mcq=>{const low=(mcq.exp||"").toLowerCase();return BAD_PHRASES.some(p=>low.includes(p))?{...mcq,_warning:true}:mcq;};
      if(Array.isArray(result.mcqs))result.mcqs=result.mcqs.map(flagMCQ);
      if(Array.isArray(result.caseMCQs?.questions))result.caseMCQs={...result.caseMCQs,questions:result.caseMCQs.questions.map(flagMCQ)};
      setGenerated(result);
      setActiveTab("dangerZones");
      setStatus("idle");
    }catch(e){
      setStatus("error");
      setStatusMsg(e.message);
    }
  };

  const handleContinue=async()=>{
    if(!apiKey){setShowSettings(true);return;}
    if(!contPdfBase64){setStatusMsg("Upload a second PDF first.");setStatus("error");return;}
    if(!generated){return;}
    setStatus("generating");setStatusMsg("");
    try{
      const prompt=buildContinuePrompt(subject,chapterName.trim(),chapterNum,generated);
      const addition=await continueWithAI(apiKey,subject,prompt,contPdfBase64);
      // Merge arrays
      const arrKeys=["dangerZones","formulaGuide","flashcards","practiceProblems","amendments","mcqs","tricky","cases","trees"];
      const merged={...generated};
      for(const key of arrKeys){
        const newItems=Array.isArray(addition[key])?addition[key]:[];
        merged[key]=[...(merged[key]||[]),...newItems];
      }
      // Merge caseMCQs — append questions
      if(addition.caseMCQs?.questions?.length){
        merged.caseMCQs={
          scenario:merged.caseMCQs?.scenario||addition.caseMCQs.scenario||"",
          questions:[...(merged.caseMCQs?.questions||[]),...addition.caseMCQs.questions]
        };
      }
      // Flag bad explanations in newly added MCQs
      const BAD_PHRASES=["let me recalculate","actually,","wait -","recomputing","nope","let me check","recalculating","wait,","hmm,","let me re","actually i","actually the","let me","re-calculating"];
      const flagMCQ=mcq=>{const low=(mcq.exp||"").toLowerCase();return BAD_PHRASES.some(p=>low.includes(p))?{...mcq,_warning:true}:mcq;};
      merged.mcqs=merged.mcqs.map(flagMCQ);
      merged.caseMCQs={...merged.caseMCQs,questions:merged.caseMCQs.questions.map(flagMCQ)};
      setGenerated(merged);
      setStatus("done");
      setStatusMsg(`✓ Added content from ${contPdfFileName}. Review tabs then save.`);
      setContPdfBase64("");setContPdfFileName("");setContPdfPageCount(null);
      setShowContinue(false);
      if(contPdfInputRef.current)contPdfInputRef.current.value="";
    }catch(e){
      setStatus("error");
      setStatusMsg(e.message);
    }
  };

  const handleSave=async()=>{
    if(!ghToken){setShowSettings(true);return;}
    if(!generated){return;}
    setStatus("saving");setStatusMsg("");
    try{
      const filePath=`src/data/${subject.file}`;
      let existingArr=[];
      let sha=null;
      try{
        const file=await ghGet(filePath,ghToken);
        sha=file.sha;
        const content=fromB64(file.content.replace(/\n/g,""));
        existingArr=JSON.parse(content.replace(`export const ${subject.varName} = `,"").trim());
        // Remove existing chapter with same ID if updating
        existingArr=existingArr.filter(ch=>ch.id!==generated.id);
      }catch{
        // File doesn't exist yet (new subject) — start fresh
      }
      existingArr.push(generated);
      const newContent=`export const ${subject.varName} = ${JSON.stringify(existingArr,null,2)}`;
      await ghPut(filePath,newContent,sha,ghToken,`Add chapter: ${generated.name} (${generated.id})`);

      // If it's a new subject file, also update constants.js
      if(!["p1","p2"].includes(subject.id)){
        await updateConstants(subject,ghToken);
      }

      setStatus("done");
      setStatusMsg(`✓ Saved! "${generated.name}" pushed to GitHub. Vercel will redeploy automatically.`);
    }catch(e){
      setStatus("error");
      setStatusMsg(`Save failed: ${e.message}`);
    }
  };

  const updateConstants=async(subj,token)=>{
    try{
      const file=await ghGet("src/constants.js",token);
      const sha=file.sha;
      let content=fromB64(file.content.replace(/\n/g,""));
      if(content.includes(subj.varName))return; // already imported
      content=`import { ${subj.varName} } from './data/${subj.file}'\n`+content;
      // Update the SUBJECTS array entry
      content=content.replace(`chapters:[],`,`chapters:${subj.varName},`);
      await ghPut("src/constants.js",content,sha,token,`Add import for ${subj.code}`);
    }catch(e){console.warn("Could not update constants.js:",e.message);}
  };

  // Tab helpers
  const tabs=[
    {id:"dangerZones",label:`Danger ${generated?.dangerZones?.length?`(${generated.dangerZones.length})`:""}`},
    {id:"formulaGuide",label:`Formula ${generated?.formulaGuide?.length?`(${generated.formulaGuide.length})`:""}`},
    {id:"flashcards",label:`Flash ${generated?.flashcards?.length?`(${generated.flashcards.length})`:""}`},
    {id:"practiceProblems",label:`Practice ${generated?.practiceProblems?.length?`(${generated.practiceProblems.length})`:""}`},
    {id:"amendments",label:`Amend ${generated?.amendments?.length?`(${generated.amendments.length})`:""}`},
    {id:"caseMCQs",label:`Case MCQs`},
    {id:"mcqs",label:`MCQs ${generated?.mcqs?.length?`(${generated.mcqs.length})`:""}`},
    {id:"tricky",label:`Tricky ${generated?.tricky?.length?`(${generated.tricky.length})`:""}`},
    ...(subject.hasCase?[
      {id:"cases",label:`Cases ${generated?.cases?.length?`(${generated.cases.length})`:""}`},
      {id:"trees",label:`Trees ${generated?.trees?.length?`(${generated.trees.length})`:""}`},
    ]:[]),
    {id:"json",label:"JSON"},
  ];

  const updateItem=(key,i,val)=>{const arr=[...(generated[key]||[])];arr[i]=val;setGenerated({...generated,[key]:arr});};
  const updateMCQ=(i,val)=>{const m=[...generated.mcqs];m[i]=val;setGenerated({...generated,mcqs:m});};
  const updateTricky=(i,val)=>{const t=[...generated.tricky];t[i]=val;setGenerated({...generated,tricky:t});};
  const updateAmend=(i,val)=>{const a=[...generated.amendments];a[i]=val;setGenerated({...generated,amendments:a});};
  const updateCase=(i,val)=>{const c=[...generated.cases];c[i]=val;setGenerated({...generated,cases:c});};
  const updateTree=(i,val)=>{const t=[...generated.trees];t[i]=val;setGenerated({...generated,trees:t});};
  const addItem=(key,template)=>setGenerated({...generated,[key]:[...(generated[key]||[]),template]});
  const removeItem=(key,i)=>{const arr=[...(generated[key]||[])];arr.splice(i,1);setGenerated({...generated,[key]:arr});};

  return(
    <div style={{minHeight:"100vh",background:C.bg}}>
      {/* Header */}
      <div style={{padding:"12px 20px",borderBottom:`1px solid ${C.b1}`,display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,background:C.bg,zIndex:10}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800}}><span style={{color:C.am}}>CA</span><span style={{color:C.t1}}>feine</span></div>
        <div style={{fontSize:10,color:C.am,letterSpacing:3,fontFamily:"'Space Mono',mono",fontWeight:700}}>ADMIN</div>
        <div style={{flex:1}}/>
        {status==="generating"&&<div style={{fontSize:12,color:C.am,display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:12,height:12,border:`2px solid ${C.am}`,borderTopColor:"transparent",borderRadius:"50%"}} className="spin"/>
          Generating...
        </div>}
        {status==="saving"&&<div style={{fontSize:12,color:C.bl,display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:12,height:12,border:`2px solid ${C.bl}`,borderTopColor:"transparent",borderRadius:"50%"}} className="spin"/>
          Saving to GitHub...
        </div>}
        <button onClick={()=>setShowSettings(true)} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.b2}`,color:C.t3,cursor:"pointer",fontSize:12}}>⚙ Keys</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"340px 1fr",minHeight:"calc(100vh - 49px)"}}>
        {/* Left Panel */}
        <div style={{borderRight:`1px solid ${C.b1}`,padding:20,overflowY:"auto"}}>
          <div style={{fontSize:10,color:C.t3,letterSpacing:2,fontFamily:"'Space Mono',mono",fontWeight:700,marginBottom:14}}>GENERATE CHAPTER</div>

          {/* Subject */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:C.t3,letterSpacing:2,fontFamily:"'Space Mono',mono",fontWeight:700,marginBottom:6}}>SUBJECT</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {SUBJECTS.map(s=>(
                <button key={s.id} onClick={()=>setSubject(s)}
                  style={{padding:"9px 12px",borderRadius:7,border:`1px solid ${subject.id===s.id?C.am:C.b2}`,background:subject.id===s.id?`${C.am}12`:"transparent",color:subject.id===s.id?C.am:C.t2,textAlign:"left",cursor:"pointer",fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span>{s.name}</span>
                  <span style={{fontSize:10,fontFamily:"'Space Mono',mono",opacity:.6}}>{s.code}</span>
                </button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:C.t3,letterSpacing:2,fontFamily:"'Space Mono',mono",fontWeight:700,marginBottom:6}}>CHAPTER NUMBER</div>
            <input type="number" min="1" value={chapterNum} onChange={e=>setChapterNum(e.target.value)} placeholder="e.g. 1"
              style={{width:"100%",background:C.s2,border:`1px solid ${C.b2}`,color:C.t1,padding:"10px 12px",borderRadius:7,fontSize:13}}/>
            {chapterNum&&<div style={{fontSize:10,color:C.t3,marginTop:4,fontFamily:"'Space Mono',mono"}}>ID will be: <span style={{color:C.am}}>{subject.prefix}{chapterNum}</span></div>}
          </div>

          <Input label="CHAPTER NAME" value={chapterName} onChange={setChapterName} placeholder="e.g. Borrowing Costs (AS 16)"/>

          {/* PDF Upload */}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:10,color:C.t3,letterSpacing:2,fontFamily:"'Space Mono',mono",fontWeight:700,marginBottom:6}}>CHAPTER PDF</div>
            <input ref={pdfInputRef} type="file" accept="application/pdf" style={{display:"none"}} onChange={e=>{
              const file=e.target.files[0];
              if(!file)return;
              const countPages=async()=>{
                try{
                  const buf=await file.arrayBuffer();
                  const txt=new TextDecoder("latin1").decode(new Uint8Array(buf));
                  const m=txt.match(/\/Type\s*\/Page[^s]/g);
                  return m?m.length:null;
                }catch{return null;}
              };
              countPages().then(pages=>{
                if(pages&&pages>100){
                  setPdfPageErr(`${pages} pages — API limit is 100. Upload a single chapter section.`);
                  setPdfBase64("");setPdfFileName("");setPdfPageCount(null);
                  if(pdfInputRef.current)pdfInputRef.current.value="";
                  return;
                }
                setPdfPageErr("");
                setPdfFileName(file.name);
                setPdfPageCount(pages);
                const reader=new FileReader();
                reader.onload=ev=>{setPdfBase64(ev.target.result.split(",")[1]);};
                reader.readAsDataURL(file);
              });
            }}/>
            {pdfBase64?(
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:7,border:`1px solid ${C.gr}40`,background:`${C.gr}08`}}>
                <span style={{fontSize:18}}>📄</span>
                <span style={{flex:1,fontSize:12,color:C.gr,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {pdfFileName}{pdfPageCount?` · ${pdfPageCount}p`:""}
                </span>
                <button onClick={()=>{setPdfBase64("");setPdfFileName("");setPdfPageCount(null);setPdfPageErr("");if(pdfInputRef.current)pdfInputRef.current.value="";}}
                  style={{color:C.t3,cursor:"pointer",fontSize:14,padding:"0 4px",flexShrink:0,background:"none",border:"none"}}>×</button>
              </div>
            ):(
              <button onClick={()=>pdfInputRef.current.click()}
                style={{width:"100%",padding:"14px 12px",borderRadius:7,border:`2px dashed ${pdfPageErr?C.rd:C.b2}`,background:"transparent",color:C.t3,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span style={{fontSize:18}}>📤</span> Upload PDF
              </button>
            )}
            {pdfPageErr&&<div style={{fontSize:11,color:C.rd,marginTop:6,lineHeight:1.5}}>{pdfPageErr}</div>}
          </div>

          {(status==="error"||status==="done")&&(
            <div style={{padding:"10px 12px",borderRadius:7,background:status==="error"?`${C.rd}12`:`${C.gr}12`,border:`1px solid ${status==="error"?C.rd:C.gr}30`,fontSize:12,color:status==="error"?C.rd:C.gr,marginBottom:12,lineHeight:1.5}}>
              {statusMsg}
            </div>
          )}

          <button onClick={handleGenerate} disabled={status==="generating"||status==="saving"}
            style={{width:"100%",padding:12,borderRadius:8,background:status==="generating"?C.s3:C.am,color:status==="generating"?C.t3:"#000",fontWeight:700,fontSize:14,cursor:status==="generating"?"default":"pointer",border:"none",marginBottom:8}}>
            {status==="generating"?"Generating...":"⚡ Generate Chapter"}
          </button>

          {generated&&(
            <button onClick={handleSave} disabled={status==="saving"}
              style={{width:"100%",padding:12,borderRadius:8,background:status==="saving"?C.s3:C.gr,color:status==="saving"?C.t3:"#000",fontWeight:700,fontSize:14,cursor:status==="saving"?"default":"pointer",border:"none"}}>
              {status==="saving"?"Saving...":"↑ Save to GitHub"}
            </button>
          )}

          {generated&&(
            <div style={{marginTop:10}}>
              <button onClick={()=>setShowContinue(!showContinue)}
                style={{width:"100%",padding:"9px 12px",borderRadius:7,border:`1px solid ${showContinue?C.pu:C.b2}`,background:showContinue?`${C.pu}10`:"transparent",color:showContinue?C.pu:C.t3,cursor:"pointer",fontSize:12,fontWeight:600,textAlign:"left",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span>+ Add more content from another PDF</span>
                <span style={{fontSize:10}}>{showContinue?"▲":"▼"}</span>
              </button>
              {showContinue&&(
                <div style={{marginTop:8,padding:12,background:C.s2,borderRadius:8,border:`1px solid ${C.b2}`}}>
                  <div style={{fontSize:11,color:C.t3,marginBottom:10,lineHeight:1.5}}>Upload a second PDF with more pages from this chapter. The AI will generate only new content and merge it with what's already here.</div>
                  <input ref={contPdfInputRef} type="file" accept="application/pdf" style={{display:"none"}} onChange={e=>{
                    const file=e.target.files[0];
                    if(!file)return;
                    const countPages=async()=>{try{const buf=await file.arrayBuffer();const txt=new TextDecoder("latin1").decode(new Uint8Array(buf));const m=txt.match(/\/Type\s*\/Page[^s]/g);return m?m.length:null;}catch{return null;}};
                    countPages().then(pages=>{
                      if(pages&&pages>100){setContPdfPageErr(`${pages} pages — limit is 100.`);setContPdfBase64("");setContPdfFileName("");setContPdfPageCount(null);if(contPdfInputRef.current)contPdfInputRef.current.value="";return;}
                      setContPdfPageErr("");setContPdfFileName(file.name);setContPdfPageCount(pages);
                      const reader=new FileReader();
                      reader.onload=ev=>{setContPdfBase64(ev.target.result.split(",")[1]);};
                      reader.readAsDataURL(file);
                    });
                  }}/>
                  {contPdfBase64?(
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,border:`1px solid ${C.pu}40`,background:`${C.pu}08`,marginBottom:8}}>
                      <span style={{fontSize:16}}>📄</span>
                      <span style={{flex:1,fontSize:11,color:C.pu,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{contPdfFileName}{contPdfPageCount?` · ${contPdfPageCount}p`:""}</span>
                      <button onClick={()=>{setContPdfBase64("");setContPdfFileName("");setContPdfPageCount(null);if(contPdfInputRef.current)contPdfInputRef.current.value="";}} style={{color:C.t3,cursor:"pointer",fontSize:13,padding:"0 3px",background:"none",border:"none"}}>×</button>
                    </div>
                  ):(
                    <button onClick={()=>contPdfInputRef.current.click()}
                      style={{width:"100%",padding:"10px 12px",borderRadius:6,border:`2px dashed ${contPdfPageErr?C.rd:C.pu}40`,background:"transparent",color:C.t3,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginBottom:6}}>
                      <span style={{fontSize:16}}>📤</span> Upload second PDF
                    </button>
                  )}
                  {contPdfPageErr&&<div style={{fontSize:11,color:C.rd,marginBottom:6}}>{contPdfPageErr}</div>}
                  <button onClick={handleContinue} disabled={!contPdfBase64||status==="generating"}
                    style={{width:"100%",padding:"10px 12px",borderRadius:7,background:(!contPdfBase64||status==="generating")?C.s3:C.pu,color:(!contPdfBase64||status==="generating")?C.t3:"#fff",fontWeight:700,fontSize:13,cursor:(!contPdfBase64||status==="generating")?"default":"pointer",border:"none"}}>
                    {status==="generating"?"⏳ Generating...":"⚡ Generate & Merge"}
                  </button>
                </div>
              )}
            </div>
          )}

          {!apiKey&&(
            <div style={{marginTop:12,padding:"10px 12px",borderRadius:7,background:`${C.am}10`,border:`1px solid ${C.am}30`,fontSize:12,color:C.am}}>
              ⚠ Add your Anthropic API key in ⚙ Keys to generate content.
            </div>
          )}
        </div>

        {/* Right Panel */}
        <div style={{display:"flex",flexDirection:"column",overflowY:"auto"}}>
          {!generated?(
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:C.t3}}>
              <div style={{fontSize:40}}>⚡</div>
              <div style={{fontSize:14}}>Fill in the details and click Generate</div>
              <div style={{fontSize:12,maxWidth:360,textAlign:"center",lineHeight:1.6}}>The AI will create ICAI-standard MCQs, tricky points, decision trees, and scenario cases.</div>
            </div>
          ):(
            <div className="fade" style={{padding:20}}>
              {/* Chapter header */}
              <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:16}}>
                <div style={{flex:1}}>
                  <input value={generated.name||""} onChange={e=>setGenerated({...generated,name:e.target.value})}
                    style={{width:"100%",background:"transparent",border:"none",color:C.t1,fontSize:18,fontFamily:"'Syne',sans-serif",fontWeight:700,padding:0}}/>
                  <div style={{fontSize:11,color:C.t3,fontFamily:"'Space Mono',mono",marginTop:4}}>{generated.id} · {subject.name}</div>
                </div>
              </div>

              {/* Tabs */}
              <div style={{display:"flex",gap:2,marginBottom:16,borderBottom:`1px solid ${C.b1}`,paddingBottom:0,overflowX:"auto"}}>
                {tabs.map(t=>(
                  <button key={t.id} onClick={()=>setActiveTab(t.id)}
                    style={{padding:"8px 14px",borderRadius:"6px 6px 0 0",border:"none",background:activeTab===t.id?C.s2:"transparent",color:activeTab===t.id?C.t1:C.t3,cursor:"pointer",fontSize:12,fontWeight:activeTab===t.id?600:400,borderBottom:activeTab===t.id?`2px solid ${C.am}`:"2px solid transparent",whiteSpace:"nowrap",flexShrink:0}}>
                    {t.label}
                  </button>
                ))}
              </div>

              {/* Tab content */}
              {activeTab==="dangerZones"&&(
                <div>
                  {(generated.dangerZones||[]).map((dz,i)=><DangerZoneCard key={i} item={dz} onChange={v=>updateItem("dangerZones",i,v)} onDelete={()=>removeItem("dangerZones",i)}/>)}
                  <Btn onClick={()=>addItem("dangerZones",{id:`${generated.id}.DZ${(generated.dangerZones?.length||0)+1}`,point:"",mistake:"",why:"",priority:"High"})} outline>+ Add Danger Zone</Btn>
                </div>
              )}

              {activeTab==="formulaGuide"&&(
                <div>
                  {(generated.formulaGuide||[]).map((t,i)=><TreeCard key={i} item={t} onChange={v=>updateItem("formulaGuide",i,v)} onDelete={()=>removeItem("formulaGuide",i)}/>)}
                  <Btn onClick={()=>addItem("formulaGuide",{id:`${generated.id}.FG${(generated.formulaGuide?.length||0)+1}`,topic:"New Formula Tree",nodes:[{id:"n1",label:"Opening condition?",branches:[{label:"Yes",target:"outcomeA"},{label:"No",target:"outcomeB"}]}],outcomes:[{id:"outcomeA",label:"Outcome if Yes",reference:""},{id:"outcomeB",label:"Outcome if No",reference:""}]})} outline>+ Add Formula Tree</Btn>
                </div>
              )}

              {activeTab==="flashcards"&&(
                <div>
                  {(generated.flashcards||[]).map((fc,i)=><FlashCard key={i} item={fc} onChange={v=>updateItem("flashcards",i,v)} onDelete={()=>removeItem("flashcards",i)}/>)}
                  <Btn onClick={()=>addItem("flashcards",{id:`${generated.id}.FC${(generated.flashcards?.length||0)+1}`,front:"",back:"",section:""})} outline>+ Add Flashcard</Btn>
                </div>
              )}

              {activeTab==="practiceProblems"&&(
                <div>
                  {(generated.practiceProblems||[]).map((pp,i)=><PracticeProblemCard key={i} item={pp} onChange={v=>updateItem("practiceProblems",i,v)} onDelete={()=>removeItem("practiceProblems",i)}/>)}
                  <Btn onClick={()=>addItem("practiceProblems",{id:`${generated.id}.PP${(generated.practiceProblems?.length||0)+1}`,title:"",difficulty:2,problem:"",steps:[],answer:"",topic:""})} outline>+ Add Problem</Btn>
                </div>
              )}
              {activeTab==="mcqs"&&(
                <div>
                  {(generated.mcqs||[]).map((mcq,i)=><MCQCard key={i} mcq={mcq} idx={i} onChange={v=>updateMCQ(i,v)}/>)}
                  <Btn onClick={()=>addItem("mcqs",{id:`${generated.id}.Q${(generated.mcqs?.length||0)+1}`,q:"",opts:["","","",""],ans:0,exp:"",type:"Concept",diff:1})} outline style={{marginTop:4}}>+ Add MCQ</Btn>
                </div>
              )}

              {activeTab==="tricky"&&(
                <div>
                  {(generated.tricky||[]).map((t,i)=><TrickyCard key={i} item={t} onChange={v=>updateTricky(i,v)} onDelete={()=>removeItem("tricky",i)}/>)}
                  <Btn onClick={()=>addItem("tricky",{id:`${generated.id}.${(generated.tricky?.length||0)+1}`,point:"",mistake:"",why:"",priority:"High"})} outline>+ Add Tricky Point</Btn>
                </div>
              )}

              {activeTab==="amendments"&&(
                <div>
                  {(generated.amendments||[]).map((a,i)=><AmendCard key={i} item={a} onChange={v=>updateAmend(i,v)} onDelete={()=>removeItem("amendments",i)}/>)}
                  <Btn onClick={()=>addItem("amendments",{id:`${generated.id}.A${(generated.amendments?.length||0)+1}`,topic:"",what:"",oldPosition:"",newPosition:"",effectiveFrom:"",pdfStatus:"not mentioned",priority:"High"})} outline>+ Add Amendment</Btn>
                </div>
              )}

              {activeTab==="caseMCQs"&&(
                <CaseMCQsEditor data={generated.caseMCQs} onChange={v=>setGenerated({...generated,caseMCQs:v})}/>
              )}

              {activeTab==="cases"&&subject.hasCase&&(
                <div>
                  {(generated.cases||[]).map((c,i)=><CaseCard key={i} item={c} onChange={v=>updateCase(i,v)} onDelete={()=>removeItem("cases",i)}/>)}
                  <Btn onClick={()=>addItem("cases",{id:`${generated.id}.C${(generated.cases?.length||0)+1}`,scenario:"",question:"",answer:"Yes",reasoning:"",trap:"",diff:3})} outline>+ Add Case</Btn>
                </div>
              )}

              {activeTab==="trees"&&subject.hasCase&&(
                <div>
                  {(generated.trees||[]).map((t,i)=><TreeCard key={i} item={t} onChange={v=>updateTree(i,v)} onDelete={()=>removeItem("trees",i)}/>)}
                  <Btn onClick={()=>addItem("trees",{id:`${generated.id}.DT${(generated.trees?.length||0)+1}`,topic:"New Decision Tree",nodes:[{id:"n1",label:"Opening condition?",branches:[{label:"Yes",target:"outcomeA"},{label:"No",target:"outcomeB"}]}],outcomes:[{id:"outcomeA",label:"Outcome if Yes",reference:""},{id:"outcomeB",label:"Outcome if No",reference:""}]})} outline>+ Add Decision Tree</Btn>
                </div>
              )}

              {activeTab==="json"&&(
                <div>
                  <div style={{display:"flex",justifyContent:"flex-end",marginBottom:8}}>
                    <Btn onClick={()=>navigator.clipboard.writeText(JSON.stringify(generated,null,2))} outline style={{fontSize:11,padding:"6px 12px"}}>Copy JSON</Btn>
                  </div>
                  <pre style={{background:C.s2,border:`1px solid ${C.b2}`,borderRadius:8,padding:16,fontSize:11,color:C.t2,overflowX:"auto",lineHeight:1.6,fontFamily:"'Space Mono',mono",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                    {JSON.stringify(generated,null,2)}
                  </pre>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {showSettings&&<Settings onClose={()=>setShowSettings(false)} apiKey={apiKey} setApiKey={setApiKey} ghToken={ghToken} setGhToken={setGhToken}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
